# Build multi-OS d'Eliadex + publication de la Release — tourne dans le dépôt
# PUBLIC (minutes GitHub Actions illimitées et gratuites pour un dépôt public).
#
# Le code source vit dans le dépôt PRIVÉ `eliadex-source` : ce workflow le
# checkout via le secret SOURCE_TOKEN (PAT avec Contents: Read sur le privé),
# build macOS + Windows, puis publie la Release ICI via le GITHUB_TOKEN intégré.
#
# Prérequis (Settings > Secrets du dépôt public) :
#   SOURCE_TOKEN = PAT (fine-grained: Contents Read sur Sh1v4x/eliadex-source).
#
# Déclenchement : onglet Actions > "Build & Release" > Run workflow (choisis le
# tag, ex. v0.1.0). Ou pousse un tag v*.*.* sur CE dépôt.
name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag de version de la release (ex. v0.1.0)"
        required: true
      ref:
        description: "Ref source à builder (branche ou tag du dépôt privé)"
        required: false
        default: main
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

env:
  SOURCE_REPO: Sh1v4x/eliadex-source

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_target: aarch64-apple-darwin
          - os: windows-latest
            args: ""
            rust_target: ""
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout de la source privée
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ github.event.inputs.ref || 'main' }}
          token: ${{ secrets.SOURCE_TOKEN }}

      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Générer les données de jeu + images
        run: |
          cd ingest && bun install && bun run build
          cd ../app && bun install && bun run sync:db

      # Build Tauri + publication de la Release dans CE dépôt public : installeurs
      # (.msi/.exe/.dmg) + artefacts updater signés (.sig) + latest.json. Avec un
      # tagName, tauri-action crée/maj la release via GITHUB_TOKEN et fusionne
      # latest.json entre les deux plateformes de la matrice.
      - name: Build & publication de la Release
        uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          args: ${{ matrix.args }}
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: Eliadex ${{ github.event.inputs.tag || github.ref_name }}
          releaseDraft: false
          prerelease: false

      # Empreintes SHA-256 (intégrité) ajoutées à la release.
      - name: Checksums SHA-256
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          hash() { if command -v sha256sum >/dev/null 2>&1; then sha256sum "$1"; else shasum -a 256 "$1"; fi; }
          find app/src-tauri/target -type f \( -name '*.dmg' -o -name '*.msi' -o -name '*-setup.exe' \) | while read -r f; do
            hash "$f" | awk -v n="$(basename "$f")" '{print $1"  "n}' > "$f.sha256"
            gh release upload "$TAG" "$f.sha256" --repo "${{ github.repository }}" --clobber || true
          done
